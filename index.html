<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shikho Finance Governance Dashboard</title>
<link href="https://db.onlinewebfonts.com/c/41a37b5ce5c3e0b6200b09e4f6e8b5e5?family=Gibson" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#354894; --navy-2:#4659A6; --navy-deep:#101B4D;
  --magenta:#CF278D; --gold:#E1A92E; --teal:#39A8B8;
  --green:#2E8B66; --green-bg:#EAF6F0; --red:#C84F5E; --red-bg:#FBEDEF; --amber:#B97818; --amber-bg:#FFF5DD;
  --bg:#F5F7FB; --card:#FFFFFF; --text:#17203B; --muted:#6D7689; --faint:#9AA4B5; --line:#E2E7F0;
  --shadow:0 10px 28px rgba(17,32,77,.07); --shadow-soft:0 1px 4px rgba(17,32,77,.06);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Gibson','Inter',Arial,sans-serif;font-size:14px;}
.sidebar{position:fixed;inset:0 auto 0 0;width:78px;background:linear-gradient(180deg,var(--navy-deep),var(--navy));z-index:1000;transition:width .24s ease;box-shadow:8px 0 22px rgba(16,27,77,.16);overflow:hidden;}
.sidebar:hover{width:260px}
.logo-area{height:70px;display:flex;align-items:center;gap:13px;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.logo-mark{width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex:0 0 42px}
.logo-mark img{width:42px;height:42px;object-fit:contain;display:block}
.logo-copy{opacity:0;transition:opacity .16s ease;color:white;line-height:1.05;white-space:nowrap}
.sidebar:hover .logo-copy{opacity:1}
.logo-copy strong{display:block;font-size:16px;letter-spacing:-.2px}
.logo-copy span{display:block;font-size:11px;color:rgba(255,255,255,.62);margin-top:4px}
.nav-list{padding:14px 10px;display:flex;flex-direction:column;gap:7px}
.nav-item{height:48px;display:flex;align-items:center;gap:15px;padding:0 15px;border-radius:14px;color:rgba(255,255,255,.68);cursor:pointer;transition:all .18s ease;white-space:nowrap;}
.nav-item:hover{background:rgba(255,255,255,.09);color:#fff}
.nav-item.active{background:rgba(207,39,141,.98);color:#fff;box-shadow:0 8px 20px rgba(207,39,141,.22)}
.nav-icon{width:27px;height:27px;display:grid;place-items:center;flex:0 0 27px}
.nav-icon svg{width:25px;height:25px;stroke-width:2.35}
.nav-label{opacity:0;font-weight:700;font-size:13px;letter-spacing:-.1px;transition:opacity .16s ease}
.sidebar:hover .nav-label{opacity:1}
.topbar{position:fixed;top:0;left:78px;right:0;height:70px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);z-index:900;display:flex;align-items:center;gap:14px;padding:0 24px}
.topbar-title{font-weight:900;font-size:18px;color:var(--navy);letter-spacing:-.45px;line-height:1.1}
.topbar-subtitle{display:none}
.spacer{flex:1}
.period-select{height:38px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:0 14px;color:var(--text);font-family:inherit;font-weight:700;outline:none;box-shadow:var(--shadow-soft)}
.btn-group{display:flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:13px;background:#F7F9FC;box-shadow:var(--shadow-soft)}
.btn-group button{border:0;background:transparent;border-radius:10px;padding:8px 12px;font-family:inherit;font-weight:800;font-size:11px;color:var(--muted);cursor:pointer;transition:.16s ease}
.btn-group button.active{background:var(--navy);color:white;box-shadow:0 5px 12px rgba(38,59,133,.22)}
.icon-btn{height:38px;width:38px;border:1px solid var(--line);border-radius:12px;background:#fff;display:grid;place-items:center;color:var(--muted);cursor:pointer}
.main{margin-left:78px;margin-top:70px;padding:24px;min-height:100vh}
.page{display:none;animation:fadeIn .24s ease} .page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.section-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.section-left{display:flex;align-items:center;gap:13px}
.section-num{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:white;display:grid;place-items:center;box-shadow:0 10px 22px rgba(38,59,133,.18)}
.section-num svg{width:22px;height:22px;stroke-width:2.35}
.section-title{font-size:24px;font-weight:900;color:var(--navy);letter-spacing:-.7px}
.section-sub{font-size:13px;color:var(--faint);font-weight:600;margin-top:4px}
.view-note{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow-soft)}
.data-status{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow-soft);color:var(--muted);font-size:12px;font-weight:800}
.data-status strong{color:var(--navy)}
.data-status.warning{border-color:#F2D28E;background:#FFFCF2;color:#8A5A13}
.data-status.ok{border-color:#D7EBDD;background:#F7FCF9;color:#2E6E52}
.data-status-message{flex-basis:100%;line-height:1.45}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:22px}
.kpi-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card:before{content:'';position:absolute;inset:0 auto 0 0;width:5px;background:var(--navy)}
.kpi-card.good:before{background:var(--green)} .kpi-card.bad:before{background:var(--red)} .kpi-card.watch:before{background:var(--amber)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.kpi-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;font-weight:900;color:var(--faint)}
.kpi-status{font-size:10px;font-weight:900;padding:4px 8px;border-radius:999px}
.kpi-status.good{color:var(--green);background:var(--green-bg)} .kpi-status.bad{color:var(--red);background:var(--red-bg)} .kpi-status.watch{color:var(--amber);background:var(--amber-bg)}
.kpi-value{font-size:28px;line-height:1;font-weight:900;color:var(--navy);letter-spacing:-.8px;margin:16px 0 10px}
.kpi-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;font-weight:800}
.badge{display:inline-flex;gap:5px;align-items:center;padding:4px 8px;border-radius:999px;background:#F3F6FB;color:var(--muted)}
.badge.good{background:var(--green-bg);color:var(--green)} .badge.bad{background:var(--red-bg);color:var(--red)} .badge.watch{background:var(--amber-bg);color:var(--amber)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.chart-grid.full{grid-template-columns:1fr}
.chart-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.chart-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:16px 18px 11px;border-bottom:1px solid var(--line)}
.chart-title{font-size:12px;text-transform:uppercase;letter-spacing:.55px;font-weight:900;color:#34405C}
.chart-sub{font-size:11px;color:var(--faint);font-weight:600;margin-top:4px;text-transform:none;letter-spacing:0}
.chart-body{height:360px;padding:16px;position:relative}
.chart-body.tall{height:430px} .chart-body.short{height:300px}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.insight-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.insight-head{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:900;color:var(--navy);display:flex;align-items:center;gap:10px}
.insight-head span{width:5px;height:22px;border-radius:10px;background:var(--magenta)}
.insight-card:nth-child(2) .insight-head span{background:var(--amber)} .insight-card:nth-child(3) .insight-head span{background:var(--navy)}
.insight-body{padding:14px 18px;color:var(--muted);font-size:12.5px;line-height:1.65}
.insight-body ul{margin:0;padding-left:17px} .insight-body li{margin:6px 0}
.table-wrap{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px} th{background:var(--navy);color:#fff;padding:11px 12px;text-align:right;font-weight:900;white-space:nowrap} th:first-child,td:first-child{text-align:left} td{padding:10px 12px;border-bottom:1px solid #F0F3F8;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums} tr.total-row td{font-weight:900;background:#F8FAFD;color:var(--navy)}
.pos-var{color:var(--green)!important;font-weight:900} .neg-var{color:var(--red)!important;font-weight:900} .watch-var{color:var(--amber)!important;font-weight:900}
.pl-controls{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.pl-toggle-btn{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:11px;padding:8px 12px;font-family:inherit;font-size:11px;font-weight:900;cursor:pointer;box-shadow:var(--shadow-soft)}
.pl-toggle-btn:hover{background:#F7F9FC}
.pl-table td:first-child{min-width:260px}
.pl-row-main.expandable{cursor:pointer}
.pl-row-main.expandable:hover td{background:#F8FAFD}
.pl-expander{display:inline-grid;place-items:center;width:18px;height:18px;margin-right:8px;border-radius:6px;background:#EEF2FB;color:var(--navy);font-size:12px;font-weight:900;vertical-align:middle}
.pl-placeholder{display:inline-block;width:26px}
.pl-child-row td{background:#FCFDFF;color:var(--muted);font-size:11.5px}
.pl-child-row td:first-child{padding-left:46px}
.pl-subheader-row td{background:#F7F9FC!important;color:#273B78!important;font-weight:900!important;border-top:1px solid #E1E6EF}
.pl-subheader-row td:first-child{padding-left:46px!important}
.pl-nested-row td:first-child{padding-left:68px!important}
.pl-nested-row td:first-child:before{content:'›';display:inline-block;margin-right:8px;color:var(--faint);font-weight:900}
.pl-flow-row td,.pl-flow-row td:first-child{font-weight:900!important;color:var(--navy)!important;background:#F8FAFD}
.pl-flow-row td.pos-var{color:var(--green)!important}
.pl-flow-row td.neg-var{color:var(--red)!important}
.pl-flow-row td.watch-var{color:var(--amber)!important}
.pl-table-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 14px 10px;border-bottom:1px solid var(--line);background:#fff;position:sticky;left:0;z-index:2}
.pl-table-title{font-weight:900;color:var(--navy);font-size:14px;margin:0}
.pl-table-head .small-select{min-width:190px}
.pl-table{font-size:13px}
.pl-table th{font-size:12.5px;padding:13px 14px}
.pl-table td{font-size:13px;padding:12px 14px}
.pl-table .pl-child-row td{font-size:12.5px}
.pl-table-title{font-size:15px}
.pl-section-row td{font-weight:900;color:#34405C;background:#FBFCFF}
.chart-control-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.small-select{height:34px;border:1px solid var(--line);border-radius:11px;background:#fff;padding:0 10px;color:var(--text);font-family:inherit;font-weight:800;font-size:11px;outline:none;box-shadow:var(--shadow-soft)}
.line-toggle-box{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
.line-toggle{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;cursor:pointer;transition:.16s ease}
.line-toggle.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.metric-pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;color:var(--muted);box-shadow:var(--shadow-soft)}
.pill strong{color:var(--navy)}
.rev-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:22px}
.rev-kpi-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:118px}
.rev-kpi-card:before{content:'';position:absolute;inset:0 auto 0 0;width:5px;background:var(--navy)}
.rev-kpi-card.good:before{background:var(--green)}
.rev-kpi-card.bad:before{background:var(--red)}
.rev-kpi-card.watch:before{background:var(--amber)}
.rev-kpi-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;font-weight:900;color:var(--faint);margin-bottom:12px}
.rev-kpi-value{font-size:25px;line-height:1.05;font-weight:900;color:var(--navy);letter-spacing:-.7px;margin-bottom:10px}
.rev-kpi-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:11px;font-weight:800}
.rev-kpi-sub{display:block;color:var(--navy);font-size:11px;font-weight:800;margin-top:3px;line-height:1.35}
.rev-kpi-card.period .rev-kpi-value{color:var(--navy);font-size:23px}
.subline{display:block;font-size:10.5px;font-weight:800;margin-top:4px;color:var(--muted)}
.pill .subline{display:block;margin-top:3px;color:var(--faint);font-size:10.5px;font-weight:700}

.chart-filter{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}
.chart-filter label{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:10.5px;font-weight:900;cursor:pointer;box-shadow:var(--shadow-soft);user-select:none}
.chart-filter input{accent-color:var(--magenta);width:13px;height:13px}
.chart-filter label.active{border-color:rgba(207,39,141,.42);background:rgba(207,39,141,.07);color:var(--navy)}
.chart-card.clickable canvas{cursor:pointer}
.modal-backdrop{position:fixed;inset:0;background:rgba(16,27,77,.42);backdrop-filter:blur(6px);z-index:2200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-backdrop.open{display:flex}
.modal-card{width:min(1080px,96vw);max-height:88vh;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 80px rgba(16,27,77,.28);display:flex;flex-direction:column}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.modal-title{font-size:19px;font-weight:900;color:var(--navy);letter-spacing:-.35px}
.modal-sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}
.modal-close{border:0;background:#F3F6FB;color:var(--muted);border-radius:12px;width:36px;height:36px;font-size:22px;line-height:1;cursor:pointer}
.modal-body{padding:18px 22px 22px;overflow:auto}
.modal-tabs{display:flex;gap:8px;margin-bottom:16px}
.modal-tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-family:inherit;font-weight:900;font-size:11px;color:var(--muted);cursor:pointer}
.modal-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.modal-chart-box{height:360px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
.modal-table{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:auto}
.modal-table table th{background:#F7F9FC;color:var(--navy)}
.drill-click-note{font-size:10.5px;color:var(--magenta);font-weight:900;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:900px){.modal-grid{grid-template-columns:1fr}.modal-chart-box{height:300px}}

@media(max-width:1180px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}.insight-grid{grid-template-columns:1fr}.topbar{overflow:auto}}
@media(max-width:760px){.sidebar{width:0}.topbar,.main{left:0;margin-left:0}.main{padding:16px}.kpi-grid{grid-template-columns:1fr}}


.cost-driver-card{height:100%;min-height:330px;padding:0;background:#fff;border:0;border-radius:0;box-shadow:none;display:flex;flex-direction:column;overflow:hidden}
.pl-basis-card .chart-title{color:var(--navy)}
.cost-driver-inner{padding:18px 20px 14px;display:flex;flex-direction:column;gap:14px;min-height:260px}
.cost-driver-tag{align-self:flex-start;background:#EEF2FB;color:var(--navy);border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;letter-spacing:.9px;text-transform:uppercase}
.cost-driver-title{font-size:15px;line-height:1.35;font-weight:900;color:var(--navy);max-width:95%}
.cost-driver-bars{display:flex;flex-direction:column;gap:13px;margin-top:4px}
.cost-driver-row{display:grid;grid-template-columns:135px 1fr 104px;gap:12px;align-items:center}
.cost-driver-label{font-size:12px;font-weight:800;color:#56617A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cost-driver-track{height:10px;background:#E7EBF3;border-radius:999px;position:relative;overflow:hidden}
.cost-driver-fill{height:100%;border-radius:999px;min-width:0;transition:width .25s ease}
.cost-driver-fill.revenue{background:linear-gradient(90deg,var(--navy),var(--navy-2))}
.cost-driver-fill.cost{background:linear-gradient(90deg,#F59BAA,#D94B63)}
.cost-driver-fill.margin{background:linear-gradient(90deg,#78C7AD,var(--green))}
.cost-driver-fill.margin.negative{background:linear-gradient(90deg,#F59BAA,#C84F5E)}
.cost-driver-fill.actual{background:linear-gradient(90deg,var(--magenta),#D94B9F)}
.cost-driver-value{font-size:12px;font-weight:900;text-align:right;font-variant-numeric:tabular-nums;color:var(--navy)}
.cost-driver-value small{display:block;font-size:10px;font-weight:800;color:var(--faint);margin-top:2px}
.cost-driver-value.cost{color:var(--red)}
.cost-driver-value.margin.good{color:var(--green)}
.cost-driver-value.margin.bad{color:var(--red)}
.cost-driver-value.actual{color:var(--magenta)}
.cost-driver-footer{border-top:1px solid #E2E7F0;padding:13px 20px 15px;color:#616C84;font-size:12px;line-height:1.45;background:#fff}
.cost-driver-footer strong{color:#2E3C65}
.cost-driver-empty{display:grid;place-items:center;height:100%;color:var(--muted);font-weight:700}


/* ===== Shikho Brand System Refresh =====
   Based on the uploaded Shikho design template:
   indigo-led surfaces, rounded cards, soft shadows, Poppins/Hind Siliguri typography,
   restrained accents, and calmer product-style UI.
*/
:root{
  --navy:#394E99;
  --navy-2:#4B60B2;
  --navy-deep:#111A4A;
  --magenta:#C02980;
  --gold:#E6A600;
  --red:#E03350;
  --red-bg:#FFF0F2;
  --green:#2E8B66;
  --green-bg:#EAF6F0;
  --amber:#B97818;
  --amber-bg:#FFF6DA;
  --bg:#F4F6FB;
  --card:#FFFFFF;
  --text:#111827;
  --muted:#667085;
  --faint:#98A2B3;
  --line:#E5E9F2;
  --shadow:0 18px 46px rgba(17,26,74,.075);
  --shadow-soft:0 8px 22px rgba(17,26,74,.06);
  --radius-card:24px;
  --radius-control:16px;
}

body{
  background:
    radial-gradient(circle at 0% 0%, rgba(57,78,153,.08), transparent 28%),
    linear-gradient(180deg,#F8FAFE 0%,#F3F6FB 100%);
  font-family:'Poppins','Hind Siliguri','Inter',Arial,sans-serif;
  color:var(--text);
  letter-spacing:-.01em;
}

.sidebar{
  background:
    radial-gradient(circle at 20% 8%, rgba(192,41,128,.28), transparent 28%),
    linear-gradient(180deg,#111A4A 0%,#24347D 55%,#394E99 100%);
  box-shadow:14px 0 34px rgba(17,26,74,.18);
}
.logo-area{
  height:76px;
  border-bottom:1px solid rgba(255,255,255,.10);
}
.logo-mark{
  width:44px;height:44px;flex-basis:44px;
  background:rgba(255,255,255,.98);
  border-radius:14px;
  box-shadow:0 12px 28px rgba(0,0,0,.12);
}
.logo-mark img{width:34px;height:34px}
.logo-copy strong{font-size:17px;font-weight:900}
.logo-copy span{font-size:11px;opacity:.82}
.nav-list{padding:16px 10px;gap:8px}
.nav-item{
  height:50px;
  border-radius:18px;
  color:rgba(255,255,255,.72);
}
.nav-item:hover{
  background:rgba(255,255,255,.10);
  color:#fff;
}
.nav-item.active{
  background:linear-gradient(135deg,var(--magenta),#D83D93);

<script>
let DASH=null;
let dashboardDataLoaded=false;
async function loadDashboardData(){
  const response=await fetch('/api/dashboard-data',{cache:'no-store'});
  if(!response.ok){
    const txt=await response.text().catch(()=>'');
    throw new Error(`Unable to load dashboard data. ${response.status} ${response.statusText} ${txt}`);
  }
  const data=await response.json();
  if(data && data.ok===false){
    throw new Error(data.error || 'Dashboard data API returned an error.');
  }
  DASH=data;
  dashboardDataLoaded=true;
}
function showDashboardLoading(){
  const main=document.getElementById('main');
  if(!main) return;
  main.innerHTML=`<section class="page active"><div style="min-height:calc(100vh - 140px);display:grid;place-items:center;">
    <div style="width:min(460px,92vw);background:white;border:1px solid #E5E9F2;border-radius:24px;box-shadow:0 18px 46px rgba(17,26,74,.075);padding:30px;text-align:center;">
      <div style="width:50px;height:50px;border-radius:18px;margin:0 auto 16px;background:linear-gradient(135deg,#394E99,#4B60B2);display:grid;place-items:center;color:#fff;font-weight:900;">S</div>
      <div style="font-size:20px;font-weight:900;color:#111A4A;margin-bottom:8px;">Loading dashboard data</div>
      <div style="font-size:13px;color:#667085;font-weight:600;line-height:1.5;">Fetching the latest data from Google Sheets...</div>
    </div>
  </div></section>`;
}
function showDashboardError(error){
  const main=document.getElementById('main');
  if(!main) return;
  main.innerHTML=`<section class="page active"><div style="min-height:calc(100vh - 140px);display:grid;place-items:center;">
    <div style="width:min(560px,92vw);background:white;border:1px solid #FFD3DA;border-radius:24px;box-shadow:0 18px 46px rgba(17,26,74,.075);padding:30px;text-align:center;">
      <div style="width:50px;height:50px;border-radius:18px;margin:0 auto 16px;background:#FFF0F2;display:grid;place-items:center;color:#E03350;font-weight:900;">!</div>

function numericValuesForAxis(cfg, axisId='y'){
  const vals=[];
  const datasets=(cfg?.data?.datasets)||[];
  datasets.forEach(ds=>{
    const dsAxis=ds.yAxisID||'y';
    if(dsAxis!==axisId) return;
    (ds.data||[]).forEach(v=>{
      if(v==null) return;
      if(typeof v==='number' && Number.isFinite(v)) vals.push(v);
      else if(Array.isArray(v)) v.forEach(n=>{ if(typeof n==='number' && Number.isFinite(n)) vals.push(n); });
      else if(typeof v==='object'){
        const y=v.y;
        if(typeof y==='number' && Number.isFinite(y)) vals.push(y);
        else if(Array.isArray(y)) y.forEach(n=>{ if(typeof n==='number' && Number.isFinite(n)) vals.push(n); });
      }
    });
  });
  return vals;
}

const waterfallDataLabelPlugin={
  id:'waterfallDataLabelPlugin',
  afterDatasetsDraw(chart,args,opts){
    const {ctx,chartArea}=chart;
    const ds=chart.data.datasets?.[0];
    const labels=opts?.labels || ds?._labelValues || ds?._amounts || [];

    const meta=chart.getDatasetMeta(0);
    ctx.save();
    ctx.font='800 11px Inter, Poppins, sans-serif';
    ctx.textAlign='center';
    meta.data.forEach((bar,i)=>{
      const raw=labels[i];
      if(raw==null || !Number.isFinite(raw)) return;
      const p=bar.getProps(['x','y','base','width'],true);
      const top=Math.min(p.y,p.base), bottom=Math.max(p.y,p.base), height=Math.abs(p.base-p.y);
      const value=raw;
      let y, fill=C.axis, baseline='bottom';
      const isCost=opts?.types?.[i]==='cost' || ds?._types?.[i]==='cost';
      const isNegative=value<0 && !isCost;
      if(isCost){
        if(height>30){ y=top+(height/2)+4; baseline='middle'; fill='#FFFFFF'; }
        else { y=top-7; baseline='bottom'; fill=C.axis; }
      } else if(isNegative){
        y=bottom+15; baseline='top'; fill=C.axis;
      } else if(height>46 && p.width>38){
        y=top+15; baseline='top'; fill='#FFFFFF';
      } else {
        y=top-7; baseline='bottom'; fill=C.axis;
      }

      ctx.fillStyle=fill;
      ctx.textBaseline=baseline;
      ctx.fillText(fUSDK(value), p.x, y);
    });
    ctx.restore();
  }
};

const barDataLabelPlugin={
  id:'barDataLabelPlugin',
  afterDatasetsDraw(chart,args,opts){
    const {ctx,chartArea}=chart;
    ctx.save();

    ctx.textAlign='center';
    (chart.data.datasets||[]).forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      meta.data.forEach((bar,i)=>{
        let raw=(ds._labelValues&&ds._labelValues[i]!=null)?ds._labelValues[i]:(ds.data||[])[i];
        if(Array.isArray(raw)) return;
        if(raw==null || !Number.isFinite(raw)) return;
        const p=bar.getProps(['x','y','base','width'],true);
        const top=Math.min(p.y,p.base), bottom=Math.max(p.y,p.base), height=Math.abs(p.base-p.y);
        const isNegative=raw<0;
        const forceOutside=opts?.forceOutside || ds._labelForceOutside;
        const enoughInside=!forceOutside && height>30 && p.width>34;
        let y, fill, baseline;
        if(enoughInside){
          fill='#FFFFFF';
          baseline=isNegative?'bottom':'top';
          y=isNegative?bottom-8:top+8;
        }else{
          fill=opts?.color || ds._labelColor || C.axis;
          baseline=isNegative?'top':'bottom';
          y=isNegative?bottom+7:top-7;

function latestMonthWithData(dataset){

function prevMonth(m){const order=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const x=monthYear(m); let mi=order.indexOf(x.mon); if(mi<=0) return 'Dec-'+String(x.yr-2001).padStart(2,'0'); return order[mi-1]+'-'+String(x.yr-2000).padStart(2,'0');}

function execKpi(label,current,prior,fmt,opts={}){

function aovValueForItem(item,period,viewMode='monthly'){

function aovMonthsForTrend(){

function revenueTotalByChannel(period=state.period,view=state.view){
  return sum(revRows('channel',period,view).map(r=>r.amount||0));
}
function revenueSalesByChannel(period=state.period,view=state.view){
  const source=revenueDataSource('channel');
  return sum(revenueChannelItems().map(it=>revValFromKeys(source,'Sales_Volume',it.keys,period,view)||0));
}
function topRevenueShare(kind,period=state.period,view=state.view){
  const rows=revRows(kind,period,view);
  const total=sum(rows.map(r=>r.amount||0));
  if(!rows.length||!total) return null;
  const top=rows.slice().sort((a,b)=>(b.amount||0)-(a.amount||0))[0];
  return {label:top.label,share:top.amount/total*100,amount:top.amount};
}
function revenueYoY(metricFn){
  const current=metricFn(state.period,state.view);
  const priorPeriod=prevYearMonth(state.period);
  const prior=metricFn(priorPeriod,state.view);
  return {current,prior,pct:pctChange(current,prior),delta:current!=null&&prior!=null?current-prior:null};
}
function revenuePrevMonth(metricFn){
  if(state.view==='ytd') return {current:null,prior:null,pct:null,delta:null,label:null};
  const pm=prevMonth(state.period);
  const current=metricFn(state.period,'monthly');
  const prior=metricFn(pm,'monthly');
  return {current,prior,pct:pctChange(current,prior),delta:current!=null&&prior!=null?current-prior:null,label:monthLabelLong(pm)};
}
function revBadge(text,value,lower=false){

}
function revValueBadge(text,value,lower=false){

}
function topRevenueCompare(kind){
  const cur=topRevenueShare(kind,state.period,state.view);
  const ly=topRevenueShare(kind,prevYearMonth(state.period),state.view);

  return {cur,ly,delta};
}
function pointChangeText(delta){

function channelSplit(period=state.period,view=state.view){
  const source=revenueDataSource('channel');
  const ts=revValFromKeys(source,'Revenue',['Telesales'],period,view);
  const total=revenueTotalByChannel(period,view);
  const nonTs=(total!=null&&ts!=null)?total-ts:null;
  return {ts,nonTs,total,tsPct:total?ts/total*100:null,nonTsPct:total?nonTs/total*100:null};
}
function renderRevenuePills(){
  const salesYoy=revenueYoY(revenueSalesByChannel);
  const salesPm=revenuePrevMonth(revenueSalesByChannel);
  const aovMetric=(period,view)=>{const rev=revenueTotalByChannel(period,view); const sales=revenueSalesByChannel(period,view); return sales?rev/sales:null;};
  const aovYoy=revenueYoY(aovMetric);
  const aovPm=revenuePrevMonth(aovMetric);
  const currentSplit=channelSplit(state.period,state.view);
  const lySplit=channelSplit(prevYearMonth(state.period),state.view);
  const source=revenueDataSource('newrepeat');
  const newVal=revValFromKeys(source,'Revenue',['New'],state.period,state.view);
  const repeatVal=revValFromKeys(source,'Revenue',['Repeat'],state.period,state.view);
  const lyPeriod=prevYearMonth(state.period);
  const newLy=revValFromKeys(source,'Revenue',['New'],lyPeriod,state.view);
  const repeatLy=revValFromKeys(source,'Revenue',['Repeat'],lyPeriod,state.view);
  const total=(newVal||0)+(repeatVal||0);
  const lyTotal=(newLy||0)+(repeatLy||0);
  const newPct=total?newVal/total*100:null;
  const repeatPct=total?repeatVal/total*100:null;
  const newPctLy=lyTotal?newLy/lyTotal*100:null;
  const repeatPctLy=lyTotal?repeatLy/lyTotal*100:null;
  const salesMeta=`${revBadge('YoY',salesYoy.pct)}${state.view==='monthly'?revBadge('MoM',salesPm.pct):''}`;
  const aovMeta=`${revBadge('YoY',aovYoy.pct)}${state.view==='monthly'?revBadge('MoM',aovPm.pct):''}`;
  const tsMeta=`<span class="badge">LY: TS ${fPct(lySplit.tsPct)} / Non-TS ${fPct(lySplit.nonTsPct)}</span>`;
  const mixMeta=`<span class="badge">LY: ${fPct(newPctLy)} / ${fPct(repeatPctLy)}</span>`;
  const valueMeta=`<span class="badge">LY New: ${fUSD(newLy)}</span><span class="badge">LY Repeat: ${fUSD(repeatLy)}</span>`;
  el('revPills').className='rev-kpi-grid';
  el('revPills').innerHTML=
    revenueCard('AOV',fUSD(aovYoy.current,false),aovMeta,aovYoy.pct==null?'watch':aovYoy.pct>=0?'good':'bad')+
    revenueCard('Sales',fInt(salesYoy.current),salesMeta,salesYoy.pct==null?'watch':salesYoy.pct>=0?'good':'bad')+
    revenueCard('TS vs Non-TS Split',`TS ${fPct(currentSplit.tsPct)} / Non-TS ${fPct(currentSplit.nonTsPct)}`,tsMeta,'watch')+
    revenueCard('New vs Repeat %',`${fPct(newPct)} / ${fPct(repeatPct)}`,mixMeta,'watch')+
    revenueCard('New vs Repeat Revenue',`New ${fUSD(newVal)} / Repeat ${fUSD(repeatVal)}`,valueMeta,'watch');
}

function pctSeriesFor(metric){

function costCleanLabel(name){

function plMetricNumerator(metric){
  const map={'GM%':'Gross Margin','CM 1 %':'Profit Contribution 1','CM 2 %':'Profit Contribution 2','CM 3 %':'Profit Contribution 3','EBITDA %':'EBITDA'};
  return map[metric]||null;

function plPeriodValue(key, period, view=state.view){
  const months=DASH.pl.months, a=DASH.pl.actual, arr=a[key];

  return view==='ytd' ? ytdValue(arr, months, period) : val(arr, idx(months, period));
}
function plMarginValue(metric, period, view=state.view){
  const numeratorKey=plMetricNumerator(metric);
  const revenue=plPeriodValue('Net Revenue', period, view);
  const numerator=numeratorKey ? plPeriodValue(numeratorKey, period, view) : null;
  return revenue ? numerator/revenue*100 : null;
}
function periodFriendlyLabel(){ return state.view==='ytd'?`YTD ${monthLabelLong(state.period)}`:monthLabelLong(state.period); }
function clampPct(v){ return Math.max(0, Math.min(100, Number.isFinite(v)?v:0)); }
function barWidth(v){ const x=clampPct(v); return x>0 && x<3 ? 3 : x; }
function costIntensityLabel(v){ return v==null ? '—' : `${v.toFixed(1)}% of revenue`; }
function marginAmountLabel(key){
  if(key==='Gross Margin') return 'gross margin';
  if(key==='Profit Contribution 1') return 'CM1';
  if(key==='Profit Contribution 2') return 'CM2';
  if(key==='Profit Contribution 3') return 'CM3';
  if(key==='EBITDA') return 'EBITDA';

}
function renderPLCostDriverCard(layer){
  const host=el('plCost_'+layer.id); if(!host) return;
  const revenue=plPeriodValue('Gross Revenue',state.period,state.view)||0;
  const cost=Math.abs(plPeriodValue(layer.plCost,state.period,state.view)||0);

  const marginAmount=marginKey?plPeriodValue(marginKey,state.period,state.view):null;
  const costPct=revenue?cost/revenue*100:null;

  const marginState=(marginPct||0)>=0?'good':'bad';
  const headline=`${layer.plCostLabel} consumed ${costPct==null?'—':fPct(costPct)} of Gross Revenue; ${layer.marginLabel} was ${fPct(marginPct)}.`;
  const footer=`For <strong>${periodFriendlyLabel()}</strong>, ${fUSD(revenue)} Gross Revenue and ${fUSD(cost)} ${layer.plCostLabel.toLowerCase()} left ${marginAmount==null?'—':fUSD(marginAmount)} in ${marginAmountLabel(marginKey)}.`;
  host.innerHTML=`<div class="cost-driver-card"><div class="cost-driver-inner"><div class="cost-driver-title">${headline}</div><div class="cost-driver-bars"><div class="cost-driver-row"><div class="cost-driver-label">Gross Revenue</div><div class="cost-driver-track"><div class="cost-driver-fill revenue" style="width:100%"></div></div><div class="cost-driver-value">${fUSD(revenue)}<small>100%</small></div></div><div class="cost-driver-row"><div class="cost-driver-label">${layer.plCostLabel}</div><div class="cost-driver-track"><div class="cost-driver-fill cost" style="width:${costWidth}%"></div></div><div class="cost-driver-value cost">${fUSD(cost)}<small>${costIntensityLabel(costPct)}</small></div></div><div class="cost-driver-row"><div class="cost-driver-label">${layer.marginLabel}</div><div class="cost-driver-track"><div class="cost-driver-fill margin ${marginState==='bad'?'negative':''}" style="width:${marginWidth}%"></div></div><div class="cost-driver-value margin ${marginState}">${fPct(marginPct)}<small>${marginAmount==null?'—':fUSD(marginAmount)}</small></div></div></div></div><div class="cost-driver-footer">${footer}</div></div>`;
}
function accTotalKey(layer, data){
  if(layer.id==='sm') return null;
  if(data[layer.total]) return layer.total;
  return Object.keys(data).find(k=>k.toLowerCase().includes('total')) || null;
}
function accBreakdownKeys(layer, data){
  if(layer.id==='sm') return Object.keys(data).filter(k=>!k.toLowerCase().includes('total'));
  return Object.keys(data).filter(k=>!k.toLowerCase().includes('total'));
}
function accValue(arr,months,period,view){
  if(view==='ytd') return ytdValue(arr,months,period);
  return val(arr,idx(months,period));
}
function accPriorPeriod(period){return prevYearMonth(period);}
function yearColor(period){
  const yr=currentYearLabel(period);
  if(yr===2024) return C.blueLight;
  if(yr===2025) return C.magenta;
  if(yr===2026) return C.navy;
  return C.grey;
}
function yearHoverColor(period){
  const yr=currentYearLabel(period);
  if(yr===2024) return '#7EA6F3';

function accTotalFromBreakdown(layer,data,months,period,view){
  const totalKey=accTotalKey(layer,data);

  return accBreakdownKeys(layer,data).reduce((sum,key)=>sum+(accValue(data[key],months,period,view)||0),0);
}

function nextPeriod(m){
  if(!m) return null;
  const [mon,yy]=m.split('-');
  const mi=PERIOD_MONTHS.indexOf(mon);
  let yr=2000+parseInt(yy,10);
  if(mi<0 || !Number.isFinite(yr)) return null;
  const nextMi=(mi+1)%12;
  if(nextMi===0) yr+=1;
  return PERIOD_MONTHS[nextMi]+'-'+String(yr-2000).padStart(2,'0');
}
function cashForecastStart(){
  return DASH?.periods?.forecastFrom||DASH?.meta?.forecastFrom||nextPeriod(latestActualPeriod());
}
function cashActualMonths(){
  const latest=latestActualPeriod();
  const latestSerial=periodSerial(latest);
  return new Set((DASH.cash||[])
    .filter(r=>r.Scenario==='Base' && periodSerial(r.Month)<=latestSerial)
    .map(r=>r.Month));
}
function cashForecastLabel(){
  const start=cashForecastStart();
  return start?`${start} onward`:'forecast period';
}
function cashActualLabel(){
  const actuals=[...cashActualMonths()].sort((a,b)=>periodSerial(a)-periodSerial(b));
  return actuals.length?`${actuals[0]} to ${actuals[actuals.length-1]}`:`up to ${latestActualPeriod()}`;
}
function cashForecastRangeLabel(){
  const start=cashForecastStart();
  const months=(DASH.cash||[]).filter(r=>r.Scenario==='Base').map(r=>r.Month).sort((a,b)=>periodSerial(a)-periodSerial(b));
  const future=months.filter(m=>start && periodSerial(m)>=periodSerial(start));
  return future.length?`${future[0]} to ${future[future.length-1]}`:(start?`${start} onward`:'forecast period');
}
function cashBalanceClass(v){ if(v==null) return 'watch-var'; if(v<0) return 'neg-var'; if(v<100000) return 'watch-var'; return 'pos-var'; }
function cashScenarioColors(){ return {Base:C.navy,Optimistic:C.gold,Pessimistic:C.magenta}; }
function cashForecastShadePlugin(labels, forecastStart=null){
  const start=forecastStart||cashForecastStart();
  return {
    id:'cashForecastShade_'+String(start||'none').replace(/[^a-zA-Z0-9]/g,''),
    beforeDatasetsDraw(chart,args,opts){
      const x=chart.scales.x; if(!x) return;
      const chartLabels=labels||chart.data.labels||[];
      const startIndex=chartLabels.indexOf(start);
      if(startIndex<0) return;
      const {ctx,chartArea}=chart;
      const tickGap=(chartLabels.length>1)?(x.getPixelForTick(1)-x.getPixelForTick(0)):36;
      const left=x.getPixelForTick(startIndex)-(Number.isFinite(tickGap)?tickGap/2:18);
      const shadeLeft=Math.max(chartArea.left,left);
      ctx.save();
      ctx.fillStyle='rgba(225,169,46,0.10)';
      ctx.fillRect(shadeLeft, chartArea.top, chartArea.right-shadeLeft, chartArea.bottom-chartArea.top);
      ctx.fillStyle='rgba(185,120,24,0.92)';
      ctx.font='700 11px Gibson, Inter, Arial, sans-serif';
      ctx.textAlign='center';
      ctx.fillText('Forecast', shadeLeft+(chartArea.right-shadeLeft)/2, chartArea.top+16);
      ctx.restore();
    }
  };
}
function cashNegativeZonePlugin(){
  return {
    id:'cashNegativeZone',
    beforeDatasetsDraw(chart,args,opts){
      const y=chart.scales.y; if(!y) return;
      if(y.min>=0 || y.max<=0) return;
      const {ctx,chartArea}=chart;
      const zeroY=Math.max(chartArea.top, Math.min(chartArea.bottom, y.getPixelForValue(0)));
      ctx.save();
      ctx.fillStyle='rgba(200,79,94,0.09)';
      ctx.fillRect(chartArea.left, zeroY, chartArea.right-chartArea.left, chartArea.bottom-zeroY);
      ctx.strokeStyle='rgba(200,79,94,0.28)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(chartArea.left, zeroY);
      ctx.lineTo(chartArea.right, zeroY);
      ctx.stroke();
      ctx.restore();
    }
  };
}

function cashNoteHtml(note){
  if(!note) return '';
  return String(note).split('|').map(part=>{
    const raw=part.trim();
    if(!raw) return '';
    const lower=raw.toLowerCase();
    let klass='cash-note-neutral', label='Note', body=raw;
    if(lower.startsWith('inflow:')){
      klass='cash-note-inflow';
      label='Inflow';
      body=raw.replace(/^inflow:\s*/i,'');
    } else if(lower.startsWith('outflow:')){
      klass='cash-note-outflow';
      label='Outflow';
      body=raw.replace(/^outflow:\s*/i,'');
    }
    return `<span class="cash-note-chip ${klass}"><strong>${label}</strong><span>${body}</span></span>`;
  }).join('');
}

    const current=metricAmountFor(k,ctxs.current.period,ctxs.current.view)||0;
    const prior=metricAmountFor(k,ctxs.prior.period,ctxs.prior.view)||0;
    return {label:cleanLineLabel(k),current,prior,delta:current-prior,pct:pctChange(current,prior)};
  }).filter(r=>r.current!==0||r.prior!==0);
  const currentTotal=sum(rows.map(r=>r.current));
  const priorTotal=sum(rows.map(r=>r.prior));
  const deltaTotal=currentTotal-priorTotal;
  const pctTotal=pctChange(currentTotal,priorTotal);
  const tableRows=rows.map(r=>`<tr><td>${r.label}</td><td>${fUSD(r.current,false)}</td><td>${fUSD(r.prior,false)}</td>${varianceCell(r.delta,false,false)}${varianceCell(r.pct,true,false)}</tr>`).join('');
  el('drillBody').innerHTML=`<div class="modal-tabs"><button class="modal-tab ${tab==='channel'?'active':''}" onclick="renderGrossRevenueComparisonDrilldown('channel')">By Channel</button><button class="modal-tab ${tab==='course'?'active':''}" onclick="renderGrossRevenueComparisonDrilldown('course')">By Course</button></div><div class="modal-grid"><div class="modal-chart-box"><canvas id="execDrillChart"></canvas></div><div class="modal-table"><table><thead><tr><th>${tab==='course'?'Course':'Channel'}</th><th>${ctxs.current.label}</th><th>${ctxs.prior.label}</th><th>Variance</th><th>Var %</th></tr></thead><tbody>${tableRows}<tr class="total-row"><td>Total</td><td>${fUSD(currentTotal,false)}</td><td>${fUSD(priorTotal,false)}</td>${varianceCell(deltaTotal,false,false)}${varianceCell(pctTotal,true,false)}</tr></tbody></table></div></div>`;
  chart('execDrillChart',{
    type:'bar',
    data:{labels:rows.map(r=>r.label),datasets:[
      dsBar(ctxs.current.label,rows.map(r=>r.current),C.navy),
      dsBar(ctxs.prior.label,rows.map(r=>r.prior),C.magenta)
    ]},
    options:baseOptions('usd',false)
  });
}
function renderEbitdaDrilldown(ctx){
  const wf={
    netRevenue:metricAmountFor('Net Revenue',ctx.period,ctx.view),
    cogs:metricAmountFor('Total: COGS',ctx.period,ctx.view),
    academic:metricAmountFor('Total Academic Support Cost',ctx.period,ctx.view),
    sm:metricAmountFor('Total: S&M Cost',ctx.period,ctx.view),
    brand:metricAmountFor('Less: Brand Marketing Cost',ctx.period,ctx.view),
    indirect:metricAmountFor('Total: Indirect Cost',ctx.period,ctx.view),
    ebitda:metricAmountFor('EBITDA',ctx.period,ctx.view)
  };
  const rows=[
    {label:'Net Revenue',amount:wf.netRevenue,type:'start'},
    {label:'COGS',amount:-Math.abs(wf.cogs||0),type:'cost'},
    {label:'Academic Support',amount:-Math.abs(wf.academic||0),type:'cost'},
    {label:'S&M Cost',amount:-Math.abs(wf.sm||0),type:'cost'},
    {label:'Brand Marketing',amount:-Math.abs(wf.brand||0),type:'cost'},
    {label:'Indirect Cost',amount:-Math.abs(wf.indirect||0),type:'cost'},
    {label:'EBITDA',amount:wf.ebitda,type:'end'}
  ];
  let running=0;
  const ranges=rows.map(r=>{if(r.type==='start'){running=r.amount||0;return [0,running];} if(r.type==='end')return [0,r.amount||0]; const start=running; running+=r.amount||0; return [Math.min(start,running),Math.max(start,running)];});
  el('drillBody').innerHTML=`<div class="modal-grid"><div class="modal-chart-box"><canvas id="execDrillChart"></canvas></div><div class="modal-table"><table><thead><tr><th>Step</th><th>Amount</th></tr></thead><tbody>${rows.map(r=>`<tr class="${r.type==='end'?'total-row':''}"><td>${r.label}</td><td>${fUSD(r.amount,false)}</td></tr>`).join('')}</tbody></table></div></div>`;
  chart('execDrillChart',{type:'bar',data:{labels:rows.map(r=>r.label),datasets:[{label:'Amount',data:ranges,_amounts:rows.map(r=>r.amount),_types:rows.map(r=>r.type==='start'?'checkpoint':(r.type==='end'?'ebitda':'cost')),backgroundColor:(context)=>{const r=rows[context.dataIndex]; return r.type==='start'?C.navy:(r.type==='end'?(r.amount>=0?C.green:C.red):costGradient(context.chart,false));},borderColor:(context)=>{const r=rows[context.dataIndex]; return r.type==='start'?C.navy:(r.type==='end'?(r.amount>=0?C.green:C.red):costBorder(false));},hoverBackgroundColor:(context)=>{const r=rows[context.dataIndex]; return r.type==='start'?C.navy2:(r.type==='end'?(r.amount>=0?C.green:C.red):costGradient(context.chart,true));},hoverBorderColor:(context)=>{const r=rows[context.dataIndex]; return r.type==='start'?C.navy2:(r.type==='end'?(r.amount>=0?C.green:C.red):costBorder(true));},borderWidth:1,borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:28,bottom:16}},plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>`${c.label}: ${fUSD(c.dataset._amounts[c.dataIndex],false)}`}}},scales:{x:{grid:{display:false}},y:{beginAtZero:false,grid:{color:C.grid},ticks:yTicks('usd')}}},plugins:[waterfallDataLabelPlugin]});
}

function drilldownConfigForStep(stepLabel){
  const configs={
    'Net Revenue':{
      title:'Net Revenue Bridge',
      totalKey:'Net Revenue',
      keys:['Gross Revenue','Less: Sales VAT','Less: Refunds','Less: Gateway Discounts','Less: Payment Gateway Charge'],
      mode:'bridge',
      note:'Shows Gross Revenue and direct sales costs that bridge down to Net Revenue.'
    },
    'Direct Sales Costs':{
      title:'Direct Sales Costs Drilldown',
      totalKey:'Net Revenue',
      keys:['Less: Sales VAT','Less: Refunds','Less: Gateway Discounts','Less: Payment Gateway Charge'],
      mode:'cost',
      note:'Shows direct sales costs between Gross Revenue and Net Revenue.'
    },
    'COGS':{
      title:'COGS Drilldown',
      totalKey:'Total: COGS',
      keys:['Less: Teachers Team','Less: Legacy Live Class Teachers','Less: Instructor Fees','Less: Rev Sharing','Less: Streaming Costs','Less: Database & Server Costs','Less: Shikho Shop','Less: Book Production'],
      mode:'cost',
      note:'Shows cost categories included under COGS.'
    },
    'Academic Support':{
      title:'Academic Support Drilldown',
      totalKey:'Total Academic Support Cost',
      keys:['Less: Program Management','Less: Live Class Operations'],
      mode:'cost',
      note:'Shows academic support cost categories.'
    },
    'S&M Cost':{
      title:'S&M Cost Drilldown',
      totalKey:'Total: S&M Cost',
      keys:['Less: Sales Team Cost','Less: Acquisition Marketing Cost','Less: Laptop Rental'],
      mode:'cost',
      note:'Shows main sales and marketing cost categories.'
    },
    'Brand Marketing':{
      title:'Brand Marketing Drilldown',
      totalKey:'Less: Brand Marketing Cost',
      keys:['Below the Line','Above the Line'],
      mode:'cost',
      note:'Shows BTL and ATL brand marketing spend.'
    },
    'Indirect Cost':{
      title:'Indirect Cost Drilldown',
      totalKey:'Total: Indirect Cost',
      keys:['Less: G&A','Less: Infrastructure Salaries','Less: Engineering & Product Salaries','Less: Bonus','Less: Technology OpEx','Less: Vendors VDS & TDS','Less: Salary Tax'],
      mode:'cost',
      note:'Shows indirect cost categories included below contribution margin.'
    }
  };
  return configs[stepLabel]||null;
}
function cleanLineLabel(k){
  return k.replace('Less: ','').replace('Total: ','').replace('Add: ','');
}
function openWaterfallDrilldown(stepLabel){
  if(stepLabel==='EBITDA'){
    openExecDrilldown('EBITDA',false);
    return;
  }
  const cfg=drilldownConfigForStep(stepLabel);
  if(!cfg) return;
  const ctx={period:state.period,view:state.view,label:execCurrentLabel(state.period,state.view)};
  const modal=ensureModal();
  modal.classList.add('open');
  el('drillTitle').textContent=cfg.title;
  el('drillSub').textContent=`${ctx.label} | ${ctx.view==='ytd'?'Cumulative YTD':'Selected month'} view | ${cfg.note}`;
  renderWaterfallStepDrilldown(cfg,ctx);
}
function renderWaterfallStepDrilldown(cfg,ctx){
  const rows=cfg.keys.map(k=>{
    const raw=metricAmountFor(k,ctx.period,ctx.view);
    const amount=raw==null?0:raw;
    return {key:k,label:cleanLineLabel(k),amount:cfg.mode==='bridge'&&k!=='Gross Revenue'?-Math.abs(amount):Math.abs(amount)};
  }).filter(r=>r.amount!==0);
  const total=metricAmountFor(cfg.totalKey,ctx.period,ctx.view);
  const denom=cfg.mode==='bridge'?Math.abs(metricAmountFor('Gross Revenue',ctx.period,ctx.view)||0):Math.abs(total||rows.reduce((a,b)=>a+Math.abs(b.amount),0));
  const tableRows=rows.map(r=>{
    const share=denom?Math.abs(r.amount)/denom*100:null;
    return `<tr><td>${r.label}</td><td>${fUSD(r.amount,false)}</td><td>${fPct(share)}</td></tr>`;
  }).join('');
  const totalLabel=cfg.mode==='bridge'?'Net Revenue':'Total';
  el('drillBody').innerHTML=`<div class="modal-grid"><div class="modal-chart-box"><canvas id="execDrillChart"></canvas></div><div class="modal-table"><table><thead><tr><th>Category</th><th>Amount</th><th>${cfg.mode==='bridge'?'Share of Gross Revenue':'Share of Total'}</th></tr></thead><tbody>${tableRows}<tr class="total-row"><td>${totalLabel}</td><td>${fUSD(total,false)}</td><td>${cfg.mode==='bridge'?'—':'100.0%'}</td></tr></tbody></table></div></div>`;
  if(cfg.mode==='bridge'){
    chart('execDrillChart',{type:'bar',data:{labels:rows.map(r=>r.label),datasets:[{label:'Amount',data:rows.map(r=>r.amount),backgroundColor:(context)=>{const amount=rows[context.dataIndex]?.amount||0; return amount>=0?C.navy:costGradient(context.chart,false);},borderColor:(context)=>{const amount=rows[context.dataIndex]?.amount||0; return amount>=0?C.navy:costBorder(false);},hoverBackgroundColor:(context)=>{const amount=rows[context.dataIndex]?.amount||0; return amount>=0?C.navy2:costGradient(context.chart,true);},hoverBorderColor:(context)=>{const amount=rows[context.dataIndex]?.amount||0; return amount>=0?C.navy2:costBorder(true);},borderWidth:1,borderRadius:6,borderSkipped:false}]},options:baseOptions('usd',false)});
  } else {
    chart('execDrillChart',{type:'bar',data:{labels:rows.map(r=>r.label),datasets:[{label:'Cost',data:rows.map(r=>Math.abs(r.amount)),backgroundColor:(context)=>costGradient(context.chart,false),borderColor:costBorder(false),hoverBackgroundColor:(context)=>costGradient(context.chart,true),hoverBorderColor:costBorder(true),borderWidth:1,borderRadius:6,borderSkipped:false,maxBarThickness:46}]},options:baseOptions('usd',false)});
  }
}

function render(){renderNav(); el('topbarTitle').textContent='Shikho Finance Governance Dashboard'; const current=PAGES.find(p=>p[0]===state.page); const subtitle=el('topbarSubtitle'); if(subtitle) subtitle.textContent=current?current[2]:'Finance control room'; Object.keys(charts).forEach(destroy); if(state.page==='exec')renderExec(); if(state.page==='pl')renderPL(); if(state.page==='revenue')renderRevenue(); if(state.page==='costs')renderCosts(); if(state.page==='sales')renderSales(); if(state.page==='growth')renderGrowth(); if(state.page==='cash')renderCash(); renderNav();}
function goto(p){state.page=p; render();}
el('viewGroup').addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){[...el('viewGroup').querySelectorAll('button')].forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); state.view=e.target.dataset.view; render();}});
el('periodSelect').addEventListener('change',e=>{state.period=e.target.value; render();});
el('themeToggle').addEventListener('click',()=>applyTheme(state.theme==='dark'?'light':'dark',true));
async function startDashboard(){
  try{
    showDashboardLoading();
    await loadDashboardData();
    initPeriod();
    render();
  }catch(error){
    console.error(error);
    showDashboardError(error);
  }
}
startDashboard();
</script>
